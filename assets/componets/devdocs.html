<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevDocs Viewer</title>
  
  <!-- Prism.js CSS (Syntax Highlighting) - Theme: Okaidia (VS Code Dark-like) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
  
  <style>
    /* ========================================= */
    /* 1. CSS VARIABLES & BASE STYLES           */
    /* ========================================= */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
    
    :root {
      --bg-color: rgba(18, 18, 20, 0.6);
      --sidebar-bg: rgba(255, 255, 255, 0.03);
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-main: #f0f0f0;
      --text-muted: #9aa0a6;
      --accent: #8c7ae6;
      --accent-hover: #9c88ff;
      --border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(25px);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth; /* Smooth scrolling for anchor links */
    }
    
    body {
      background: transparent;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      overflow: hidden; /* Hide main body scroll, use inner scrolling */
      height: 100vh;
      display: flex;
    }

    /* Ambient background blob */
    .ambient-bg {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(140, 122, 230, 0.08), transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(0, 184, 148, 0.05), transparent 40%);
      z-index: -1;
      pointer-events: none;
    }

    /* ========================================= */
    /* 2. LAYOUT: SIDEBAR & MAIN CONTENT        */
    /* ========================================= */
    
    .sidebar {
      width: 280px;
      height: 100vh;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.2);
      border-right: 1px solid var(--border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      display: flex;
      flex-direction: column;
      padding: 20px;
      z-index: 10;
    }

    .search-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      background: transparent;
      border: none;
      color: white;
      font-size: 14px;
      width: 100%;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .search-box input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .nav-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 5px; /* for scrollbar */
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: white;
    }

    /* Right Main Content */
    .main-content {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 40px;
      perspective: 1000px;
    }

    /* ========================================= */
    /* 3. COMPONENTS: HERO & CARDS              */
    /* ========================================= */
    
    /* Hero Section */
    .hero {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: var(--glass-blur);
      margin-bottom: 40px;
      display: flex;
      gap: 30px;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transform-origin: top center;
    }

    .hero-icon {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }

    .hero-info { flex: 1; }
    
    .hero-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #ffffff, #a0a0a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      color: var(--accent);
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Two-col Definition Grid */
    .def-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    
    .def-box {
      background: rgba(0,0,0,0.2);
      padding: 20px;
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }
    .def-box.hinglish {
      border-left-color: #00b894;
      background: linear-gradient(90deg, rgba(0, 184, 148, 0.05), transparent);
    }
    
    .def-box h4 {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* Attributes Cards */
    .attr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 24px;
      backdrop-filter: var(--glass-blur);
    }

    .attr-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .attr-title {
      font-family: 'Fira Code', monospace;
      font-size: 22px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .attr-desc-en {
      font-size: 16px;
      line-height: 1.6;
      color: #e0e0e0;
      margin-bottom: 15px;
    }

    .attr-desc-hi {
      font-size: 15px;
      line-height: 1.6;
      color: #d1eadb;
      background: rgba(0, 184, 148, 0.08);
      border-left: 3px solid #00b894;
      padding: 15px 20px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 20px;
    }

    /* Code Block Area */
    .code-wrapper {
      position: relative;
      background: #1e1e1e;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    }

    .code-header {
      background: #2d2d2d;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .code-dots {
      display: flex;
      gap: 8px;
    }
    .code-dots span {
      width: 12px; height: 12px; border-radius: 50%;
      background: #ff5f56;
    }
    .code-dots span:nth-child(2) { background: #ffbd2e; }
    .code-dots span:nth-child(3) { background: #27c93f; }

    .copy-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.2); }

    .code-wrapper pre {
      margin: 0 !important;
      padding: 20px !important;
      background: transparent !important;
      border: none !important;
      font-family: 'Fira Code', monospace !important;
      font-size: 14.5px !important;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    /* Loader */
    #loader {
      position: fixed; inset: 0; background: var(--bg-color); z-index: 50;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .spinner {
      width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s infinite cubic-bezier(0.5, 0.1, 0.4, 0.9);
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <!-- Background Ambient Glow -->
  <div class="ambient-bg"></div>

  <!-- Full Screen Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <div style="margin-top: 20px; color: var(--text-muted); font-weight: 500; font-size: 15px;">Initializing Engine...</div>
  </div>

  <!-- Left Navigation Sidebar -->
  <aside class="sidebar" id="sidebar" style="display: none;">
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="searchInput" placeholder="Search attributes...">
    </div>
    <nav class="nav-list" id="navList">
      <!-- Links generated by JS -->
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content" id="mainContent" style="display: none;">
    <!-- Hero and Cards generated by JS -->
  </main>

  <!-- ========================================= -->
  <!-- 4. EXTERNAL LIBRARIES (CDN)             -->
  <!-- ========================================= -->
  <!-- GSAP for Smooth Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Prism.js for code highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

  <!-- ========================================= -->
  <!-- 5. JAVASCRIPT LOGIC                     -->
  <!-- ========================================= -->
  <script>
    /**
     * BEGINNER GUIDE TO THIS CODE:
     * 1. Extract lang from URL
     * 2. Fetch JSON data
     * 3. Render HTML dynamically
     * 4. Highlight Code using Prism
     * 5. Animate items beautifully using GSAP
     */

    // --- STEP 1: Understand which language to load ---
    const params = new URLSearchParams(window.location.search);
    const langKey = params.get('lang') || 'html';
    
    // Map edge cases for filenames and icons
    const langFileMap = { 'html':'html', 'css':'css', 'javascript':'javascript', 'c++':'c++', 'tailwind css':'tailwind', 'next.js':'nextjs', 'node.js':'nodejs' };
    const iconFileMap = { 'html':'html.png', 'css':'css.png', 'javascript':'javascript.png', 'c++':'C++-(CPlusPlus).png', 'tailwind css':'Tailwind CSS.png', 'next.js':'Next.js.png', 'node.js':'Node.js.png' };
    
    const filename = langFileMap[langKey.toLowerCase()] || langKey.toLowerCase();
    const iconTarget = iconFileMap[langKey.toLowerCase()] || `${langKey.toLowerCase()}.png`;

    // Global variable to store data for searching
    let devData = null;

    // --- STEP 2: Fetch Data from JSON ---
    async function loadData() {
      try {
        const res = await fetch(`../data/docs/${filename}.json`);
        if (!res.ok) throw new Error('Data not found');
        devData = await res.json();
        
        buildUI();
      } catch (err) {
        showErrorPage();
      }
    }

    // --- STEP 3: Build the UI Elements ---
    function buildUI() {
      // Hide loader, show structure
      document.getElementById('loader').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'block';

      // 1. Build Hero Section
      let html = `
        <div class="hero gs-hero">
          <img src="../icon/${iconTarget}" class="hero-icon" onerror="this.src='../icon/tools.png'" alt="Logo" />
          <div class="hero-info">
            <div class="hero-subtitle">${devData.meaning}</div>
            <div class="hero-title">${devData.language}</div>
            <div style="color: #bbb; line-height: 1.5; margin-bottom: 5px; font-size: 15.5px;">
              <strong style="color:#dfdfdf;">Use Case:</strong> ${devData.useCase}
            </div>
            
            <div class="def-grid">
              <div class="def-box">
                <h4>Global Definition</h4>
                <div style="font-size: 14.5px; line-height: 1.6;">${devData.definition.en}</div>
              </div>
              <div class="def-box hinglish">
                <h4>Hinglish Meaning</h4>
                <div style="font-size: 14.5px; line-height: 1.6; color:#e0e0e0;">${devData.definition.hi}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      // 2. Build Attributes & Sidebar Navigation
      let navHtml = '';
      
      if (devData.attributesList && devData.attributesList.length > 0) {
        devData.attributesList.forEach((attr, idx) => {
          const cardId = `attr-${idx}`; // Unique ID for anchor linking

          // Build Sidebar Link
          navHtml += `
            <a href="#" onclick="scrollToAttr(event, '${cardId}')" class="nav-item gs-nav">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
              ${attr.name}
            </a>
          `;

          // Prepare Code (Escape html tags so they don't render as real inputs)
          const cleanCode = attr.example_code.replace(/</g, "&lt;").replace(/>/g, "&gt;");
          let prismLangClass = 'language-' + (filename === 'javascript' ? 'javascript' : filename);

          // Build Main Card
          html += `
            <div class="attr-card gs-card" id="${cardId}" data-name="${attr.name.toLowerCase()}">
              <div class="attr-header">
                <div class="attr-title">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8c7ae6" stroke-width="2.5"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                  ${attr.name}
                </div>
              </div>
              
              <div class="attr-desc-en">${attr.explanation_en}</div>
              <div class="attr-desc-hi">💡 <strong>Hinglish:</strong> ${attr.explanation_hi}</div>
              
              <div class="code-wrapper">
                <div class="code-header">
                  <div class="code-dots"><span></span><span></span><span></span></div>
                  <button class="copy-btn copy-action-btn" data-code="${encodeURIComponent(attr.example_code)}">Copy Code</button>
                </div>
                <pre><code class="${prismLangClass}">${cleanCode}</code></pre>
              </div>
            </div>
          `;
        });
      }

      document.getElementById('navList').innerHTML = navHtml;
      document.getElementById('mainContent').innerHTML = html;

      // Tell Prism.js to apply syntax colors to our new code blocks
      Prism.highlightAll();

      // Trigger GSAP Animations
      playEntranceAnimations();
    }

    // --- STEP 4: Real-time Search Filter ---
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      
      // Filter Sidebar Links
      document.querySelectorAll('.nav-item').forEach(link => {
        const txt = link.textContent.toLowerCase();
        link.style.display = txt.includes(term) ? 'flex' : 'none';
      });

      // Filter Main Cards
      document.querySelectorAll('.attr-card').forEach(card => {
        const name = card.getAttribute('data-name');
        if(name.includes(term)) {
          card.style.display = 'block';
          // GSAP micro animation for showing up again nicely
          gsap.fromTo(card, { opacity: 0, scale: 0.98 }, { opacity: 1, scale: 1, duration: 0.3 });
        } else {
          card.style.display = 'none';
        }
      });
    });

    // --- STEP 5: Beautiful GSAP Animations ---
    function playEntranceAnimations() {
      // Animate background glow slowly
      gsap.to('.ambient-bg', { rotation: 360, transformOrigin: "center center", duration: 120, repeat: -1, ease: "linear" });

      // Sidebar links cascade in from the left
      gsap.from('.gs-nav', {
        x: -30, opacity: 0, duration: 0.6, stagger: 0.05, ease: 'back.out(1.5)'
      });

      // Main Hero springs from top seamlessly
      gsap.from('.gs-hero', {
        y: -50, opacity: 0, scale: 0.95, duration: 0.9, ease: 'power4.out', delay: 0.1
      });

      // Cards slide up beautifully from the bottom
      gsap.from('.gs-card', {
        y: 60, opacity: 0, duration: 0.8, stagger: 0.1, ease: 'power3.out', delay: 0.3
      });
    }

    // --- STEP 6: Helper Function for Copy button ---
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-action-btn')) {
        const rawCode = decodeURIComponent(e.target.getAttribute('data-code'));
        navigator.clipboard.writeText(rawCode).then(() => {
          const originalText = e.target.innerText;
          e.target.innerText = 'Copied! ✓';
          e.target.style.background = 'rgba(39, 201, 63, 0.3)';
          setTimeout(() => {
            e.target.innerText = originalText;
            e.target.style.background = 'rgba(255,255,255,0.1)';
          }, 2000);
        });
      }
    });

    // --- STEP 7: Error Page if file missing ---
    function showErrorPage() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      
      document.getElementById('mainContent').innerHTML = `
        <div style="text-align: center; margin-top: 150px; animation: fadeIn 0.8s;">
          <h1 style="font-size: 70px; margin-bottom: 20px;">🫣</h1>
          <h2 style="font-size: 36px; color: #ff7675; margin-bottom: 15px;">Oops! Data Not Found</h2>
          <p style="color: var(--text-muted); font-size: 18px;">
            The JSON file for <strong>${langKey.toUpperCase()}</strong> is missing.
          </p>
          <p style="color: rgba(255,255,255,0.5); font-size: 15px; margin-top: 25px;">
            Add <code style="background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1)">assets/data/docs/${filename}.json</code> to build it!
          </p>
        </div>
      `;
    }

    // --- STEP 8: Custom Scroller ---
    function scrollToAttr(e, id) {
      e.preventDefault();
      const container = document.getElementById('mainContent');
      const target = document.getElementById(id);
      if (container && target) {
        container.scrollTo({
          top: target.offsetTop - 40,
          behavior: 'smooth'
        });
      }
    }

    // Start everything by calling loadData()
    setTimeout(loadData, 600); // 600ms delay to enjoy the sleek engine loader
  </script>
</body>
</html>
